name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install black isort flake8 mypy bandit
      - name: Black check
        run: black --check --line-length=100 common/ orchestrator/ services/
      - name: isort check
        run: isort --check --profile black --line-length 100 common/ orchestrator/ services/
      - name: Flake8 check
        run: flake8 --max-line-length=100 --extend-ignore=E203,E266,E501,W503 --max-complexity=15 --exclude=.git,__pycache__,.venv,venv,.trash,migrations common/ orchestrator/ services/
      - name: MyPy check
        run: mypy --ignore-missing-imports --no-strict-optional common/ orchestrator/ services/ || true
        continue-on-error: true
      - name: Bandit security check
        run: bandit -r common/ orchestrator/ services/ -c .bandit.yml || true
        continue-on-error: true

  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service:
          - orchestrator
          - video-downloader
          - audio-normalization
          - audio-transcriber
          - make-video
          - youtube-search
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }} || cd ${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout fakeredis
      - name: Run unit tests
        run: |
          if [ -d "services/${{ matrix.service }}" ]; then
            cd services/${{ matrix.service }}
          else
            cd ${{ matrix.service }}
          fi
          pytest -x -m "not slow and not integration and not e2e" -q --tb=short || true
        continue-on-error: true

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./.venv/*" -not -path "./__pycache__/*" -not -path "./.trash/*" | xargs python3 -m py_compile
      - name: Validate pyproject.toml
        run: python3 -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"