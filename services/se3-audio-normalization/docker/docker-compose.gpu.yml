name: se3-audio-normalization-gpu
services:
  audio-normalization-service:
    build:
      context: ../../..
      dockerfile: services/se3-audio-normalization/docker/Dockerfile.gpu
    container_name: audio-normalization-api
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ../../../common:/app/common
      - ../app:/app/app
      - ../data/uploads:/app/data/uploads
      - ../data/processed:/app/data/processed
      - ../data/temp:/app/data/temp
      - ../data/logs:/app/data/logs
      - /usr/lib/x86_64-linux-gnu/libcuda.so.590.48.01:/nvidia/lib/libcuda.so.590.48.01:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/nvidia/lib/libcuda.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so:/nvidia/lib/libcuda.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/nvidia/lib/libnvidia-ml.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/nvidia/lib/libnvidia-ml.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-encode.so.1:/nvidia/lib/libnvidia-encode.so.1:ro
    env_file:
      - ../.env
    environment:
      - TZ=${TZ}
      - PYTHONPATH=/app
      - NUMBA_CACHE_DIR=${NUMBA_CACHE_DIR}
      - NUMBA_DISABLE_JIT=${NUMBA_DISABLE_JIT}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/nvidia/lib:/usr/local/cuda/lib64
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    labels:
      - "com.example.service=audio-normalization"
      - "com.example.version=2.0.0-gpu"

  celery-worker:
    build:
      context: ../../..
      dockerfile: services/se3-audio-normalization/docker/Dockerfile.gpu
    container_name: audio-normalization-celery
    command: python -m celery -A app.infrastructure.celery_config worker --loglevel=info --concurrency=2 --pool=prefork --queues=audio_normalization_queue
    volumes:
      - ../../../common:/app/common
      - ../app:/app/app
      - ../data/uploads:/app/data/uploads
      - ../data/processed:/app/data/processed
      - ../data/temp:/app/data/temp
      - ../data/logs:/app/data/logs
      - /usr/lib/x86_64-linux-gnu/libcuda.so.590.48.01:/nvidia/lib/libcuda.so.590.48.01:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/nvidia/lib/libcuda.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so:/nvidia/lib/libcuda.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/nvidia/lib/libnvidia-ml.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/nvidia/lib/libnvidia-ml.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-encode.so.1:/nvidia/lib/libnvidia-encode.so.1:ro
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - C_FORCE_ROOT=${C_FORCE_ROOT}
      - NUMBA_CACHE_DIR=${NUMBA_CACHE_DIR}
      - NUMBA_DISABLE_JIT=${NUMBA_DISABLE_JIT}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/nvidia/lib:/usr/local/cuda/lib64
    restart: unless-stopped
    depends_on:
      audio-normalization-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.infrastructure.celery_config inspect ping --timeout=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "com.example.service=audio-normalization-worker"
      - "com.example.version=2.0.0-gpu"
