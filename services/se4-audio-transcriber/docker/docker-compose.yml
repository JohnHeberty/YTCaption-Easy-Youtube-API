name: se4-audio-transcriber
services:
  audio-transcriber-service:
    build:
      context: ../../..
      dockerfile: services/se4-audio-transcriber/docker/Dockerfile
    container_name: ytcaption-se4-audio-transcriber-api
    runtime: nvidia
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ../../../shared:/app/common
      - ../app:/app/app
      - ../data/uploads:/app/data/uploads
      - ../data/transcriptions:/app/data/transcriptions
      - ../data/models:/app/data/models
      - ../data/temp:/app/data/temp
      - ../data/logs:/app/data/logs
      - /usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib:ro
      - /dev/nvidia-caps:/dev/nvidia-caps:rwm
      - /dev/nvidia-modeset:/dev/nvidia-modeset:rwm
    env_file:
      - ../.env
    environment:
      - TZ=${TZ}
      - PYTHONPATH=/app
      - WHISPER_DEVICE=cuda
      - WHISPER_FALLBACK_CPU=true
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health", "-H", "accept: application/json"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  celery-worker:
    build:
      context: ../../..
      dockerfile: services/se4-audio-transcriber/docker/Dockerfile
    container_name: audio-transcriber-celery
    runtime: nvidia
    command: python -m celery -A app.infrastructure.celery_config worker --loglevel=info --concurrency=1 --pool=solo --queues=audio_transcriber_queue
    volumes:
      - ../../../shared:/app/common
      - ../app:/app/app
      - ../data/uploads:/app/data/uploads
      - ../data/transcriptions:/app/data/transcriptions
      - ../data/models:/app/data/models
      - ../data/temp:/app/data/temp
      - ../data/logs:/app/data/logs
      - /usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib:ro
      - /dev/nvidia-caps:/dev/nvidia-caps:rwm
      - /dev/nvidia-modeset:/dev/nvidia-modeset:rwm
    env_file:
      - ../.env
    environment:
      - TZ=${TZ}
      - PYTHONPATH=/app
      - C_FORCE_ROOT=true
      - WHISPER_DEVICE=cuda
      - WHISPER_FALLBACK_CPU=true
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'from app.infrastructure.celery_config import celery_app; i = celery_app.control.inspect(); exit(0 if i.stats() else 1)'"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s
    depends_on:
      audio-transcriber-service:
        condition: service_healthy

  celery-beat:
    build:
      context: ../../..
      dockerfile: services/se4-audio-transcriber/docker/Dockerfile
    container_name: audio-transcriber-beat
    command: python -m celery -A app.infrastructure.celery_config beat --loglevel=info
    volumes:
      - ../../../shared:/app/common
      - ../app:/app/app
      - ../data/logs:/app/data/logs
    env_file:
      - ../.env
    environment:
      - TZ=${TZ}
      - PYTHONPATH=/app
      - C_FORCE_ROOT=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr -d '\\0' | grep -q celery"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      audio-transcriber-service:
        condition: service_healthy
