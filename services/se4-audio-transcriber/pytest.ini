[pytest]
testpaths = tests
addopts = -m "not slow and not real and not resilience" --ignore=tests/integration
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    real: marks tests that use real models (no mocks)
    resilience: marks resilience/integration tests
    circuit_breaker: marks circuit breaker tests
    error_handling: marks error handling tests
    integration: marks integration tests requiring external services
asyncio_mode = auto
