name: se6-youtube-search
services:
  youtube-search-service:
    build:
      context: ../../..
      dockerfile: services/se6-youtube-search/docker/Dockerfile
    container_name: youtube-search-api
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ../../../shared:/app/common
      - ../app:/app/app
      - ../data/logs:/app/data/logs
    env_file:
      - ../.env
    environment:
      - TZ=${TZ:-UTC}
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - "com.example.service=youtube-search"
      - "com.example.version=1.0.0"
    networks:
      - youtube-search-network

  celery-worker:
    build:
      context: ../../..
      dockerfile: services/se6-youtube-search/docker/Dockerfile
    container_name: youtube-search-celery-worker
    command: celery -A app.infrastructure.celery_config.celery_app worker --loglevel=info --concurrency=2 -Q youtube_search_queue
    volumes:
      - ../../../shared:/app/common
      - ../app:/app/app
      - ../data/logs:/app/data/logs
    env_file:
      - ../.env
    environment:
      - TZ=${TZ:-UTC}
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.infrastructure.celery_config inspect ping -d celery@$$HOSTNAME --timeout=3 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    labels:
      - "com.example.service=youtube-search-worker"
      - "com.example.version=1.0.0"
    networks:
      - youtube-search-network

  celery-beat:
    build:
      context: ../../..
      dockerfile: services/se6-youtube-search/docker/Dockerfile
    container_name: youtube-search-celery-beat
    command: celery -A app.infrastructure.celery_config.celery_app beat --loglevel=info
    volumes:
      - ../../../shared:/app/common
      - ../app:/app/app
      - ../data/logs:/app/data/logs
    env_file:
      - ../.env
    environment:
      - TZ=${TZ:-UTC}
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr -d '\\0' | grep -q celery || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.example.service=youtube-search-beat"
      - "com.example.version=1.0.0"
    networks:
      - youtube-search-network

networks:
  youtube-search-network:
    driver: bridge
