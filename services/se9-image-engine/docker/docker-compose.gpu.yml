services:
  image-engine:
    build:
      context: ../../..
      dockerfile: services/se9-image-engine/docker/Dockerfile.gpu-api
    container_name: image-engine
    runtime: nvidia
    ports:
      - "8009:8009"
    volumes:
      - /root/YTCaption-Easy-Youtube-API/services/se9-image-engine/data/models:/app/data/models:ro
      - /root/YTCaption-Easy-Youtube-API/services/se9-image-engine/data/outputs:/app/data/outputs:rw
      # GPU device mounts (nvidia-container-toolkit workaround for driver 590)
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
      - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1
      - /usr/lib/x86_64-linux-gnu/libnvidia-cfg.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-cfg.so.1
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - /dev/nvidia-modeset:/dev/nvidia-modeset
    env_file:
      - ../.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - REDIS_URL=redis://host.docker.internal:6379/9
      - GPU_MODE=lazy
      - MODEL_DIR=/app/data/models
      - OUTPUT_DIR=/app/data/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
