services:
  image-engine:
    build:
      context: ../../..
      dockerfile: services/se8-image-generation/docker/Dockerfile.gpu-api
    container_name: image-engine
    ports:
      - "8008:8008"
    volumes:
      - /root/YTCaption-Easy-Youtube-API/services/se8-image-generation/app:/app/app:ro
      - /root/YTCaption-Easy-Youtube-API/services/se8-image-generation/data/models:/app/data/models:ro
      - /root/YTCaption-Easy-Youtube-API/services/se8-image-generation/data/outputs:/app/data/outputs:rw
      - /root/YTCaption-Easy-Youtube-API/services/se8-image-generation/data/temp:/app/data/temp:rw
      # GPU device mounts (nvidia-container-toolkit workaround for driver 590)
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
      - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1
      - /usr/lib/x86_64-linux-gnu/libnvidia-cfg.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-cfg.so.1
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - /dev/nvidia-modeset:/dev/nvidia-modeset
    env_file:
      - ../.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_DISABLE_REQUIRE=1
      - CUDA_LAUNCH_BLOCKING=1
      - REDIS_URL=redis://host.docker.internal:6379/8
      - GPU_MODE=lazy
      - MODEL_DIR=/app/data/models
      - OUTPUT_DIR=/app/data/outputs
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libmimalloc.so.2
      - MIMALLOC_PURGE_DELAY=0
      - SE8_AUTO_RESTART_IDLE=300
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
