services:
  image-engine-api:
    build:
      context: ../..
      dockerfile: services/se8-image-generation/docker/Dockerfile
      target: api
    container_name: image-engine-api
    ports:
      - "8008:8008"
    volumes:
      - ../shared/:/app/common:rw
      - ../../services/se8-image-generation/app/:/app/app:rw
      - ../../services/se8-image-generation/data/:/app/data:rw
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://host.docker.internal:6379/8
      - CELERY_BROKER_URL=redis://host.docker.internal:6379/8
      - CELERY_RESULT_BACKEND=redis://host.docker.internal:6379/8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - ytcaption-network

  image-engine-worker:
    build:
      context: ../..
      dockerfile: services/se8-image-generation/docker/Dockerfile.gpu
      target: worker
    container_name: image-engine-worker
    volumes:
      - ../shared/:/app/common:rw
      - ../../services/se8-image-generation/app/:/app/app:rw
      - ../../services/se8-image-generation/data/:/app/data:rw
      - se8-models:/app/data/models
      - se8-outputs:/app/data/outputs
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://host.docker.internal:6379/8
      - CELERY_BROKER_URL=redis://host.docker.internal:6379/8
      - CELERY_RESULT_BACKEND=redis://host.docker.internal:6379/8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      image-engine-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.infrastructure.celery_config.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 3
    networks:
      - ytcaption-network

volumes:
  se8-models:
  se8-outputs:

networks:
  ytcaption-network:
    external: true
