services:
  image-engine-api:
    build:
      context: ../../..
      dockerfile: services/se8-image-generation/docker/Dockerfile.gpu
      target: api
    container_name: image-engine-api
    ports:
      - "8008:8008"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../../shared:/app/common:rw
      - ../../../services/se8-image-generation/app/:/app/app:rw
      - ../../../services/se8-image-generation/data/:/app/data:rw
      # GPU libs (LXC passthrough) — driver 590.x compat
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so:/usr/lib/x86_64-linux-gnu/libcuda.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-encode.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-encode.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-decode.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-decode.so.1:ro
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - /dev/nvidia-modeset:/dev/nvidia-modeset
    env_file:
      - ../.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_DISABLE_REQUIRE=1
      - CUDA_LAUNCH_BLOCKING=1
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libmimalloc.so.2
      - MIMALLOC_PURGE_DELAY=0
      - REDIS_URL=redis://192.168.1.110:6379/8
      - CELERY_BROKER_URL=redis://192.168.1.110:6379/8
      - CELERY_RESULT_BACKEND=redis://192.168.1.110:6379/8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - ytcaption-network

  image-engine-worker:
    build:
      context: ../../..
      dockerfile: services/se8-image-generation/docker/Dockerfile.gpu
      target: worker
    container_name: image-engine-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../../shared:/app/common:rw
      - ../../../services/se8-image-generation/app/:/app/app:rw
      - ../../../services/se8-image-generation/data/:/app/data:rw
      # GPU libs (LXC passthrough) — driver 590.x compat
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so.1:/usr/lib/x86_64-linux-gnu/libcuda.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libcuda.so:/usr/lib/x86_64-linux-gnu/libcuda.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ptxjitcompiler.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-encode.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-encode.so.1:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-decode.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-decode.so.1:ro
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
      - /dev/nvidia-modeset:/dev/nvidia-modeset
    env_file:
      - ../.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_DISABLE_REQUIRE=1
      - CUDA_LAUNCH_BLOCKING=1
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libmimalloc.so.2
      - MIMALLOC_PURGE_DELAY=0
      - REDIS_URL=redis://192.168.1.110:6379/8
      - CELERY_BROKER_URL=redis://192.168.1.110:6379/8
      - CELERY_RESULT_BACKEND=redis://192.168.1.110:6379/8
      - SE8_AUTO_RESTART_IDLE=120
      - SE8_RSS_RESTART_MB=8000
    depends_on:
      image-engine-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.infrastructure.celery_config.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 3
    networks:
      - ytcaption-network

networks:
  ytcaption-network:
    external: true
