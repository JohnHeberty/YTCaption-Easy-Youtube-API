services:
  se9:
    build:
      context: ../../..
      dockerfile: services/se9-make-video-img/docker/Dockerfile
    container_name: se9-make-video-img
    ports:
      - "${HOST_PORT:-8009}:${CONTAINER_PORT:-8009}"
    env_file:
      - ../.env
    environment:
      - SE7_URL=http://host.docker.internal:8007
      - SE8_URL=http://host.docker.internal:8008
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../data/outputs:/app/data/outputs
      - ../data/logs:/app/data/logs
    networks:
      - ytcaption-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CONTAINER_PORT:-8009}/ping"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  ytcaption-network:
    external: true
