services:
  se10-clothes-segmentation:
    build:
      context: ../../..
      dockerfile: services/se10-clothes-segmentation/docker/Dockerfile
      target: api
    container_name: ytcaption-se10-clothes-segmentation
    ports:
      - "8010:8010"
    volumes:
      - se10-data:/app/data
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_URL=redis://host.docker.internal:6379/10
      - DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    networks:
      - ytcaption-network

volumes:
  se10-data:

networks:
  ytcaption-network:
    external: true
