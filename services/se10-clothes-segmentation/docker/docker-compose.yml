services:
  se10-clothes-segmentation:
    build:
      context: ../../..
      dockerfile: services/se10-clothes-segmentation/docker/Dockerfile
      target: api
      args:
        - DEVICE=cpu
    container_name: ytcaption-se10-clothes-segmentation
    ports:
      - "8010:8010"
    volumes:
      - ../../../shared:/app/common
      - ../app:/app/app
      - ../data:/app/data
      - /root/YTCaption-Easy-Youtube-API/yolo11m-seg.pt:/app/yolo11m-seg.pt:ro
      # BiRefNet disabled — replaced by SegFormer B2
      # - /root/YTCaption-Easy-Youtube-API/birefnet-portrait.onnx:/home/appuser/birefnet-portrait.onnx:ro
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://host.docker.internal:6379/10
      - DEVICE=cpu
      - YOLO_MODEL_PATH=/app/yolo11m-seg.pt
      # BIREFNET disabled — replaced by SegFormer B2
      # - BIREFNET_MODEL_PATH=/home/appuser/birefnet-portrait.onnx
      # Force CPU — no GPU access, prevents CUDA context allocation
      - CUDA_VISIBLE_DEVICES=
      - DISABLE_CUDA=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    networks:
      - ytcaption-network

networks:
  ytcaption-network:
    external: true
