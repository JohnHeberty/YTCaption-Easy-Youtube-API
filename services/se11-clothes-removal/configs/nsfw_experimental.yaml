# NSFW Experimental Pipeline Configuration
# Used by /jobs/nsfw-test route — testing ground for new LoRA combos and prompts.
# Differences from production: lower NsfwPov weight, higher detail weight, looser thresholds.

nsfw:
  prompt: >
    NSFW, NSFW, NSFW, NSFW, NSFW, solo, bare skin, no clothing, naked body,
    detailed breast anatomy, realistic nipples, areola details,
    natural skin pores, skin texture, skin imperfections,
    realistic body proportions, maintaining exact same body posture,
    keeping original body position, not moving, not rotating, same stance, identical pose,
    skin tone matching the person's arms and face, consistent skin color throughout,
    seamless skin transition, matching skin tone with surrounding body,
    ultra realistic photograph, DSLR photo, natural skin subsurface scattering,
    studio lighting, soft shadows, film grain, 8k uhd,
    sharp focus on body, high resolution, professional photography,
    skin pores visible, micro details on skin, lifelike skin translucency

  negative: >
    (deformed, distorted, disfigured:1.3), poorly drawn, bad anatomy,
    wrong anatomy, extra limbs, missing limbs, floating limbs, severed limbs,
    (mutated hands and fingers, extra fingers, missing fingers, webbed fingers:1.4),
    (bad hands, poorly drawn hands, fused fingers, too many fingers:1.3),
    (extra face, second face, face on body, face on chest, face below neck:2.2),
    (facial features on torso, eyes on chest, mouth on body:2.0),
    long neck, mutation, ugly, blurry, airbrushed, plastic skin, CGI, 3D, render,
    clothes, fabric, bra, straps, underwear, pattern, floral, textile,
    cartoon, anime, sketch,
    (changed pose, moved body, different position, rotated torso:1.5),
    (shifted weight, leaning, tilting, bending, twisting:1.4),
    (new angle, different posture:1.3),
    asymmetric nipples, mismatched skin tone, color banding

inpaint:
  max_attempts: 5
  base_strength: 0.86
  strength_step: 0.03
  strength_ceiling: 0.92
  inter_attempt_delay: 3
  inter_attempt_multiplier: true
  inpaint_respective_field: 0.55
  ip_adapter_faceid_weight: 0.8
  base_model: "lustifySDXLNSFW_v20-inpainting.safetensors"

pose_thresholds:
  head_threshold_pct: 3.0
  torso_threshold_pct: 8.0
  limbs_threshold_pct: 30.0
  hands_threshold_pct: 30.0

ip_adapter:
  image_prompt_cn_stop: 0.5
  image_prompt_cn_weight: 0.8
  openpose_cn_stop: 0.6
  openpose_cn_weight: 0.3

head_detection:
  max_head_pct: 0.50
  neck_margin_below: 0.3
  dilate_kernel_size: 25
  dilate_iterations: 3
  expand_up: 2.5
  expand_w: 0.5

face_protection:
  margin_above: 0.50
  margin_below: 0.70
  margin_sides: 0.40
  dilation_pct: 0.02
  feather_bottom_px: 25

scoring:
  skin_weight: 0.40
  head_weight: 0.20
  landmark_weight: 0.30
  clothes_weight: 0.10
  early_stop: 5.0

clothes_classes: "spaghetti strap, camisole, top, blouse, shirt, dress, bra, underwear, clothing, garment, skirt, pants, shorts, jeans, sweater, jacket, coat, hoodie, t-shirt"
best_clothing_classes: "spaghetti strap, camisole, top, blouse"

skin_detection:
  hsv_lower: [0, 15, 60]
  hsv_upper: [30, 170, 255]
  morph_kernel_size: 5
  open_iterations: 1
  close_iterations: 2

inline_mode:
  person_detection:
    box_threshold: 0.20
    text_threshold: 0.15
  clothes_detection:
    text_threshold: 0.05
  object_filter:
    min_area_pct: 0.1
    min_confidence: 0.10
    max_objects: 3
    bottom_edge_pct: 0.95
    bottom_edge_min_area: 1.0
  mask_params:
    dilate_kernel_size: 21
    dilate_iterations: 2
    erode_kernel_size: 15
    erode_iterations: 2
    face_region_pct: 0.30
    face_coverage_threshold: 5.0
    min_torso_coverage: 1.0
    low_coverage_threshold: 5.0
  inpaint:
    strength_person: 0.70
    strength_clothes: 0.70
    respective_field: 0.618
    erode_or_dilate_progressive: -10
  erode_dilate_thresholds:
    - min_pct: 50.0
      value: -5
    - min_pct: 30.0
      value: -8
    - min_pct: 15.0
      value: -10
    - min_pct: 5.0
      value: -15
    - min_pct: 0.0
      value: -20
  mask_cap:
    threshold_pct: 15.0
    max_erode: -30
    erode_scale: 3
    min_erode_kernel: 15

clothing_gap:
  close_kernel_size: 100
  close_iterations: 1

loras:
  - model: "NsfwPovAllInOneLoraSdxl-000009.safetensors"
    weight: 0.3
    enabled: true
  - model: "sd_xl_offset_example-lora_1.0.safetensors"
    weight: 0.1
    enabled: true
  - model: "add-detail-xl.safetensors"
    weight: 1.0
    enabled: true
  - model: "None"
    weight: 1.0
    enabled: true
  - model: "None"
    weight: 1.0
    enabled: true

se8_params:
  performance_selection: "Quality"
  sharpness: 2.0
  guidance_scale: 7.0
  inpaint_engine: "v2.6"
  overwrite_step: 50
  overwrite_switch: 1.0
  adaptive_cfg: 7.0
  sampler_name: "dpmpp_2m_sde_gpu"
  scheduler_name: "karras"
  refiner_switch: 0.5

se8_retry:
  max_attempts: 3
  base_wait: 5

enhance:
  performance_selection: "Speed"
  guidance_scale: 4.0
  aspect_ratios_selection: "1152*896"

clothes:
  clothes_prompt: >
    NSFW, NSFW, NSFW, NSFW, NSFW,
    bare skin, smooth skin surface, realistic skin texture,
    detailed breast anatomy, realistic nipples, natural skin pores,
    seamless skin transition, consistent skin tone with surrounding body,
    photorealistic, professional photography, studio lighting,
    high resolution, sharp focus on skin detail, 8k uhd,
    hyperrealistic, detailed skin rendering, natural body proportions
  person_prompt: >
    natural skin texture matching surrounding skin tone, seamless blend,
    preserve original body shape and features, realistic skin, soft lighting
  clothes_negative: >
    clothes, fabric, bra, straps, underwear, top, blouse, shirt,
    dress, skirt, pattern, floral, textile, garment,
    text, watermark, deformed, blurry, cartoon, anime, painting, CGI,
    extra limbs, disfigured, poorly drawn face, mutated hands,
    bad anatomy, deformed skin, wrinkled, scarred
  loras:
    - model: "NsfwPovAllInOneLoraSdxl-000009.safetensors"
      weight: 0.2
      enabled: true
    - model: "sd_xl_offset_example-lora_1.0.safetensors"
      weight: 0.1
      enabled: true
    - model: "add-detail-xl.safetensors"
      weight: 0.8
      enabled: true
    - model: "None"
      weight: 1.0
      enabled: true
    - model: "None"
      weight: 1.0
      enabled: true

progressive_passes:
  clothes:
    - classes: "spaghetti strap, camisole"
      box_threshold: 0.06
      text_threshold: 0.04
      inpaint_strength: 0.65
      detector: "segformer"
      name: "straps"
      se_mode: "clothes"
    - classes: "top, blouse, shirt"
      box_threshold: 0.08
      text_threshold: 0.05
      inpaint_strength: 0.60
      detector: "segformer"
      name: "top"
      se_mode: "clothes"
    - classes: "dress, clothing, garment"
      box_threshold: 0.10
      text_threshold: 0.07
      inpaint_strength: 0.55
      detector: "segformer"
      name: "full"
      se_mode: "clothes"
    - classes: "fabric, textile, outfit"
      box_threshold: 0.12
      text_threshold: 0.09
      inpaint_strength: 0.50
      detector: "segformer"
      name: "cleanup"
      se_mode: "clothes"
  person:
    - classes: "spaghetti strap, camisole"
      box_threshold: 0.06
      text_threshold: 0.04
      inpaint_strength: 0.70
      detector: "segformer"
      name: "straps"
      se_mode: "clothes"
    - classes: "top, blouse, shirt"
      box_threshold: 0.08
      text_threshold: 0.05
      inpaint_strength: 0.65
      detector: "segformer"
      name: "top"
      se_mode: "clothes"
    - classes: "dress, clothing, garment"
      box_threshold: 0.10
      text_threshold: 0.07
      inpaint_strength: 0.60
      detector: "segformer"
      name: "full"
      se_mode: "clothes"
    - classes: "fabric, textile, outfit"
      box_threshold: 0.12
      text_threshold: 0.09
      inpaint_strength: 0.55
      detector: "segformer"
      name: "cleanup"
      se_mode: "clothes"
